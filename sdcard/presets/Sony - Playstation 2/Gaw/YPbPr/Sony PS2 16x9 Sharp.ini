[main]
orig_preset_name = Sony_PS2_16x9_Sharp.ini
display_name = auto-sampled\nNTSC only
description = Description can go here
tags = Comma separated list of tags, e.g. N64,320x240
; orig_feature_mask = 0x07ffc77f

[scaler]
zoom_factor = fill
aspect_ratio = 16/9
horiz_kernel = sharper_alt
vert_kernel = sharper_alt
nn_auto_mode = on

[deinterlacer]
field_order = normal
blank_timer = 15
method = MA
sensitivity = normal
interpolator = average
detector = zero-lag
noise_threshold = 0
telecine_polarity = even

[video-misc]
buffer_mode = LOCK_OFF
triple_buffer_mode = auto
output_mode = standalone
bfi = off
antiring = off

[analog]
sync.sog_lpf_sel = 1
sync.sog_threshold = 11
sync.separator_threshold = 68
sync.h_pll_pre_coast = 1
sync.h_pll_post_coast = 0
sync.line_length_tolerance = 6
sync.vs_bypass = 0

