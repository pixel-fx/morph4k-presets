[main]
orig_preset_name = PS2_4x3.ini
display_name = auto sampled 512 640\nNTSC PS2 YPbPr 480 4:3
description = Description can go here
tags = Comma separated list of tags, e.g. N64,320x240
; orig_feature_mask = 0x073ec00f

[scaler]
zoom_factor = fill
aspect_ratio = auto
horiz_kernel = sharper_alt
vert_kernel = sharper_alt
nn_auto_mode = off

[prescale]
h = 0
h.phase = 0
v = 0/1
v.phase = 0

[deinterlacer]
field_order = normal
blank_timer = 0
method = MA
sensitivity = normal
interpolator = lower-field
detector = zero-lag
noise_threshold = 0
telecine_polarity = even

[video-misc]
buffer_mode = LOCK_OFF
triple_buffer_mode = auto
output_mode = standalone
bfi = off
antiring = off

[tx]
hdr_mode = off
vrr_mode = disabled
quantization_range = default
range_compression = auto

[analog]
sync.sog_lpf_sel = 1
sync.sog_threshold = 11
sync.separator_threshold = 68
sync.h_pll_pre_coast = 1
sync.h_pll_post_coast = 0
sync.line_length_tolerance = 6
sync.vs_bypass = 0

