[main]
orig_preset_name = Soft_Vibrant_Pixels_+_Shadowmask.ini
display_name = Soft Vibrant Pixels + Shadowmask\n- 320x240p input\n- 4K60 output
description = Description can go here
tags = Comma separated list of tags, e.g. N64,320x240
; orig_feature_mask = 0x01ffc77f

[scaler]
zoom_factor = under
aspect_ratio = 4/3
horiz_kernel = soft
vert_kernel = softer

[vertical-scanlines]
mode = off
saturation = 113
strength = 50
thickness = 0
glow = 45

[horizontal-scanlines]
mode = adaptive
saturation = 100
strength = 40
thickness = 0
glow = 100

[slotmask]
intensity = 0.85
conversion = none
data = <<EOF
vMFX
# mode: 1
# offset: 0,0
# alpha_key: 0x000000

# w,h
12,3

# lut
0x00000080,0x00168016,0x00801616,0x00801616,0x00801616,0x00000080,0x00168016,0x00168016,0x00168016,0x00801616,0x00000080,0x00000080
0x00168016,0x00168016,0x00168016,0x00801616,0x00000080,0x00000080,0x00000080,0x00168016,0x00801616,0x00801616,0x00801616,0x00000080
0x00002a2a,0x00168016,0x002a2a00,0x00801616,0x002a002a,0x00000080,0x00002a2a,0x00168016,0x002a2a00,0x00801616,0x002a002a,0x00000080
EOF

[pre-processing]
gamma = 1
deblur = off

[prescale]
h = 0
h.phase = 0
v = 0/1
v.phase = 0

[post-processing]
gamma = 1
smoothing = off

[color_input_table]
bit_crush = 0
lift = 0
gain = 1
gamma = 2.1
trans_func = Gamma
trans_func_threshold = 50

[color_csc_matrix]
prevent_clip = attenuate
saturation = 1.05
rgb2xyz = 0.41239079926595951|0.357584339383878|0.18048078840183429|0.21263900587151041|0.715168678767756|0.0721923153607337|0.0193308187155918|0.119194779794626|0.9505321522496607
xyz2rgb.hdr_off = 3.2409699419045213|-1.5373831775700932|-0.49861076029300327|-0.96924363628087973|1.8759675015077204|0.0415550574071756|0.0556300796969936|-0.20397695888897649|1.0569715142428786
xyz2rgb.hdr_hdr10 = 1.7166511879712683|-0.3556707837763925|-0.25336628137365991|-0.666684351832489|1.6164812366349388|0.0157685458139111|0.0176398574453108|-0.0427706132578085|0.94210312123547379

[color_output_table]
gamma = 2.2
nits = 1000
dithering = off

[shift-crop]
input.h_shift = 0
input.v_shift = 0
output.h_shift = 0
output.v_shift = 0
crop = off
crop.left = 0
crop.right = 0
crop.top = 0
crop.bottom = 0

[deinterlacer]
field_order = normal
blank_timer = 0
method = MA
sensitivity = normal
interpolator = lower-field
detector = zero-lag
noise_threshold = 0
telecine_polarity = even

[video-misc]
buffer_mode = LOCK_MC2
triple_buffer_mode = auto
output_mode = standalone
bfi = off
antiring = -

[tx]
hdr_mode = hdr10
vrr_mode = auto
quantization_range = full
range_compression = off

[rx]
input_cs = auto
edid_file = default.bin
fxd_mode = off
dv1_mode = off
ena_422_interp = no
md.enabled = yes
md.detect.spd_name = 
md.detect.width = 0
md.detect.height = 0
md.offsets.left = 320
md.offsets.right = -320
md.offsets.top = 60
md.offsets.bottom = -60
md.prescale.h = 1
md.prescale.v = 4/1
md.ar = 0/1
md.ign_aviif_pr = no

[analog]
sync.sog_lpf_sel = 1
sync.sog_threshold = 11
sync.separator_threshold = 68
sync.h_pll_pre_coast = 1
sync.h_pll_post_coast = 0
sync.line_length_tolerance = 6
sync.vs_bypass = 0